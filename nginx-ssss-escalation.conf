# Add this location block to /home/docker/nginx/conf.d/esurvey-api-uat.conf
# inside the existing server {} block, BEFORE the existing location / { ... } block.

location /ssss-escalation/ {
    proxy_pass http://127.0.0.1:3000/ssss-escalation/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
